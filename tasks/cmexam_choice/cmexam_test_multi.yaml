task: cmexam_test_multi
dataset_path: json
dataset_kwargs:
  data_files: /root/autodl-tmp/MedicalGPT/data/eval/lm_eval/cmexam_test_multi.jsonl
test_split: train
output_type: generate_until
doc_to_text: "{{prompt}}"
doc_to_target: "{{answer}}"
generation_kwargs:
  until:
    - "\n"
  max_gen_toks: 16
  do_sample: false
filter_list:
  - name: strict_letters
    filter:
      - function: regex
        regex_pattern: "([A-E]{1,5})"
      - function: take_first
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
